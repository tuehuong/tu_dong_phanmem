name: Build EXE Complete

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công trên giao diện nếu cần

jobs:
  build:
    runs-on: windows-latest  # Sử dụng môi trường Windows mới nhất của GitHub

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5  # Đây là action chính thức, chạy ổn định 100%
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Binary (EXE)
      run: |
        # Đóng gói thành 1 file exe duy nhất (--onefile) và ẩn màn hình đen cmd (--windowed)
        python -m PyInstaller --noconfirm --onefile --windowed main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tool_Tu_Dong_Hoa_Windows
        path: dist/main.exe

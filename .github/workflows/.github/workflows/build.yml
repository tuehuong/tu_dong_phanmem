name: Build EXE Complete

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Binary (EXE)
      run: |
        # Loại bỏ bớt một số module ẩn của hệ thống để tránh lỗi xung đột trên GitHub Actions
        python -m PyInstaller --noconfirm --onefile --windowed --clean main.py

    - name: Upload Artifact
      if: success() # Chỉ upload khi các bước trên chạy thành công hoàn toàn
      uses: actions/upload-artifact@v4
      with:
        name: Tool_Tu_Dong_Hoa_Windows
        path: dist/main.exe

name: Build EXE Complete

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Auto Create Requirements If Missing
      run: |
        # Nếu chưa có file requirements.txt, máy ảo tự tạo ra để tránh lỗi
        if (-Not (Test-Path "requirements.txt")) {
            echo "pynput" > requirements.txt
            echo "pywinauto" >> requirements.txt
        }

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Check files in folder
      run: |
        # Kiểm tra xem bạn có đặt đúng tên file main.py không
        ls

    - name: Build Binary (EXE)
      run: |
        # Buộc PyInstaller đóng gói, nếu bạn đặt tên file khác main.py, nó sẽ báo lỗi rõ ràng hơn
        python -m PyInstaller --noconfirm --onefile --windowed main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tool_Tu_Dong_Hoa_Windows
        path: dist/main.exe

name: Build EXE Complete

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # Bắt buộc chạy trên Windows để đóng gói exe cho Windows

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/platform-python@v1
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Binary (EXE)
      run: |
        pyinstaller --noconfirm --onedir --windowed main.py

    - name: Upload Artifact (Tải file EXE về)
      uses: actions/upload-artifact@v4
      with:
        name: Tool_Tu_Dong_Hoa_EXE
        path: dist/main/
